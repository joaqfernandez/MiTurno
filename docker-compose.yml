# Infraestructura local de desarrollo.
# En producción: Postgres administrado (Neon/Supabase/RDS) y Redis administrado (Upstash/Railway).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: turnos_dev
      POSTGRES_DB: turnos_medicos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turnos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
